server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Arquivos estáticos do CS Manager (index.html, api.js)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso: tudo que for /api/* vai para o backend Node.js
    # Isso permite que o frontend chame "/api/..." sem precisar saber o host/porta do backend,
    # e evita problemas de CORS já que tudo parece vir da mesma origem para o navegador.
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Áudios em base64 podem ser grandes — alinhado com o limite de 10mb do Express
        client_max_body_size 12m;
    }

    # Cache leve para os arquivos estáticos (ajuda em conexões mais lentas)
    location ~* \.(?:css|js)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
